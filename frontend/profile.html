<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillHub — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { background: var(--white); }
    .profile-wrap { max-width: 860px; margin: 0 auto; padding: 48px 32px; }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
    .profile-avatar-lg {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #c8b8a2, #a08060);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 600; color: white; flex-shrink: 0;
    }
    .profile-name { font-size: 1.25rem; font-weight: 600; color: var(--black); }
    .profile-rol { font-size: 0.85rem; color: var(--gray-text); margin-top: 3px; }
    .profile-website {
      display: inline-block; margin-top: 6px; font-size: 0.75rem;
      color: var(--gray-text); border: 1px solid var(--gray-mid);
      border-radius: 5px; padding: 2px 8px;
    }
    .hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }
    .section-title { font-size: 0.82rem; font-weight: 500; color: var(--black); margin-bottom: 16px; }
    .bio { font-size: 0.85rem; color: #444; line-height: 1.7; max-width: 560px; }
    .row-grid { display: grid; grid-template-columns: 120px 1fr; gap: 0; }
    .row-date { font-size: 0.78rem; color: var(--gray-text); padding: 10px 0; }
    .row-content { padding: 10px 0 10px 20px; }
    .row-item-title { font-size: 0.88rem; font-weight: 500; color: var(--black); }
    .row-item-sub { font-size: 0.8rem; color: var(--gray-text); margin-top: 2px; }
    .nivel-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: #f0ede8;
      color: var(--gray-text);
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .rep-value { font-size: 0.88rem; color: var(--black); }
    .rep-value strong { font-weight: 600; }
    .review-text { font-size: 0.85rem; color: #444; line-height: 1.6; }
    .contact-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 0; }
    .contact-label { font-size: 0.8rem; color: var(--gray-text); padding: 4px 0; }
    .contact-val { font-size: 0.85rem; color: var(--black); padding: 4px 0; }

    /* Edición inline */
    .edit-btn {
      font-size: 0.78rem;
      color: var(--gray-text);
      background: none;
      border: 1px solid var(--gray-mid);
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      margin-left: 10px;
      font-family: var(--font-body);
    }
    .edit-btn:hover { border-color: var(--black); color: var(--black); }

    .add-servicio-btn {
      font-size: 0.82rem;
      color: var(--gray-text);
      background: none;
      border: 1.5px dashed var(--gray-mid);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: var(--font-body);
      width: 100%;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    .add-servicio-btn:hover { border-color: var(--black); color: var(--black); }

    .loading-text { color: var(--gray-text); font-size: 0.85rem; padding: 20px 0; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="home.html" class="navbar-logo">
    <svg width="24" height="24" viewBox="0 0 52 52" fill="none">
      <rect width="52" height="52" rx="14" fill="#111"/>
      <text x="26" y="34" text-anchor="middle" fill="white" font-size="20" font-weight="600" font-family="sans-serif">SH</text>
    </svg>
    SkillHub
  </a>
  <input type="text" class="navbar-search" placeholder="Buscar servicios..."
    onfocus="window.location.href='explore.html'"/>
  <div class="navbar-spacer"></div>
  <a href="profile.html" class="btn-nav">Perfil profesional</a>
  <a href="profile.html" class="avatar-btn">
    <div class="avatar-inner" id="nav-avatar">SV</div>
  </a>
</nav>

<div class="profile-wrap">
  <div id="loading" class="loading-text">Cargando perfil...</div>
  <div id="perfil-content" style="display:none">

    <!-- Encabezado -->
    <div class="profile-header">
      <div class="profile-avatar-lg" id="p-avatar">SV</div>
      <div>
        <div class="profile-name" id="p-nombre">—</div>
        <div class="profile-rol" id="p-rol">—</div>
        <span class="profile-website" id="p-website" style="display:none"></span>
      </div>
      <div style="margin-left:auto;" id="edit-header-btn"></div>
    </div>

    <hr class="hr"/>

    <!-- Sobre mí -->
    <div style="margin-bottom:32px;">
      <div class="section-title">Sobre mí</div>
      <p class="bio" id="p-bio">—</p>
    </div>

    <hr class="hr"/>

    <!-- Lo que ofrece -->
    <div style="margin-bottom:32px;">
      <div class="section-title" style="display:flex;align-items:center;">
        Lo que ofrece
        <span id="btn-add-servicio-wrap"></span>
      </div>
      <div id="p-servicios-ofrece">
        <div class="loading-text">Cargando...</div>
      </div>
    </div>

    <hr class="hr"/>

    <!-- Lo que busca -->
    <div style="margin-bottom:32px;">
      <div class="section-title">Lo que busca aprender</div>
      <div id="p-servicios-busca">
        <div class="loading-text">Sin datos</div>
      </div>
    </div>

    <hr class="hr"/>

    <!-- Reputación -->
    <div style="margin-bottom:32px;">
      <div class="section-title">Reputación en SkillHub</div>
      <div class="row-grid" id="p-reputacion"></div>
    </div>

    <hr class="hr"/>

    <!-- Reseñas -->
    <div style="margin-bottom:32px;">
      <div class="section-title">Reseñas de otras personas</div>
      <div id="p-resenas"><div class="loading-text">Cargando...</div></div>
    </div>

    <hr class="hr"/>

    <!-- Contacto -->
    <div style="margin-bottom:48px;" id="contacto-section"></div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();

  const sesion = getUsuario();
  if (sesion) document.getElementById('nav-avatar').textContent = iniciales(sesion.nombre);

  // Determinar qué perfil mostrar
  const params = new URLSearchParams(window.location.search);
  const perfilId = params.get('id') || sesion?.id;
  const esPropio = !params.get('id') || params.get('id') === sesion?.id;

  function renderServicios(servicios) {
    if (!servicios || !servicios.length) return '<p style="font-size:0.85rem;color:var(--gray-text);">Sin servicios publicados aún</p>';
    return `<div class="row-grid">` + servicios.map(s => `
      <div class="row-date">2024 — Ahora</div>
      <div class="row-content">
        <div class="row-item-title">
          ${s.titulo}
          <span class="nivel-badge">${s.nivel || ''}</span>
          ${esPropio ? `<button class="edit-btn" onclick="cambiarEstadoServicio('${s._id}', '${s.estado === 'activo' ? 'pausado' : 'activo'}').then(cargarPerfil)">
            ${s.estado === 'activo' ? 'Pausar' : 'Activar'}
          </button>` : ''}
        </div>
        <div class="row-item-sub">${s.ciudad || ''}</div>
      </div>`).join('') + `</div>`;
  }

  function renderBusca(items) {
    if (!items || !items.length) return '<p style="font-size:0.85rem;color:var(--gray-text);">Nada especificado</p>';
    return `<div class="row-grid">` + items.map(i => `
      <div class="row-date">${i.anio || '—'}</div>
      <div class="row-content"><div class="row-item-title">${i.titulo} ↗</div></div>`).join('') + `</div>`;
  }

  function renderResenas(resenas) {
    if (!resenas || !resenas.length) return '<p style="font-size:0.85rem;color:var(--gray-text);">Sin reseñas todavía</p>';
    return resenas.map(r => `
      <div style="display:grid;grid-template-columns:80px 1fr;gap:0;margin-bottom:12px;">
        <div class="row-date">${new Date(r.createdAt).getFullYear()}</div>
        <div class="row-content">
          <div style="font-size:0.78rem;color:var(--gray-text);margin-bottom:3px;">
            ${'★'.repeat(r.puntuacion)}${'☆'.repeat(5-r.puntuacion)} · ${r.autorId?.nombre || 'Usuario'}
          </div>
          <div class="review-text">${r.comentario}</div>
        </div>
      </div>`).join('');
  }

  async function cargarPerfil() {
    try {
      const [perfil, resenas] = await Promise.all([
        obtenerPerfil(perfilId),
        obtenerResenas(perfilId),
      ]);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('perfil-content').style.display = 'block';

      document.getElementById('p-avatar').textContent = iniciales(perfil.nombre);
      document.getElementById('p-nombre').textContent = perfil.nombre;
      document.getElementById('p-rol').textContent = perfil.rol || 'Miembro de SkillHub';
      document.getElementById('p-bio').textContent = perfil.descripcion || 'Sin descripción aún.';

      if (perfil.website) {
        const wb = document.getElementById('p-website');
        wb.textContent = perfil.website;
        wb.style.display = 'inline-block';
      }

      // Botones solo para perfil propio
      if (esPropio) {
        document.getElementById('btn-add-servicio-wrap').innerHTML =
          `<button class="edit-btn" onclick="alert('Próximamente: publicar servicio desde aquí')">+ Agregar</button>`;
        document.getElementById('contacto-section').innerHTML = `
          <div class="section-title">Contacto</div>
          <div class="contact-grid">
            <div class="contact-label">Instagram</div>
            <div class="contact-val">${perfil.instagram ? '@' + perfil.instagram : '—'}</div>
            <div class="contact-label">Teléfono</div>
            <div class="contact-val">${perfil.telefono || '—'}</div>
          </div>`;
      }

      document.getElementById('p-servicios-ofrece').innerHTML = renderServicios(perfil.serviciosOfrece);
      document.getElementById('p-servicios-busca').innerHTML = renderBusca(perfil.serviciosBusca);

      document.getElementById('p-reputacion').innerHTML = `
        <div class="row-date">2024</div>
        <div class="row-content"><div class="rep-value">Horas aportadas: <strong>${perfil.horasAportadas || 0} h</strong></div></div>
        <div class="row-date">2024</div>
        <div class="row-content"><div class="rep-value">Horas recibidas: <strong>${perfil.horasRecibidas || 0} h</strong></div></div>
        <div class="row-date">—</div>
        <div class="row-content"><div class="rep-value">Valoración: <strong>${perfil.valoracion?.toFixed(2) || '—'}/5</strong></div></div>`;

      document.getElementById('p-resenas').innerHTML = renderResenas(resenas);

    } catch (err) {
      document.getElementById('loading').textContent = 'No se pudo cargar el perfil. ' + err.message;
    }
  }

  cargarPerfil();
</script>
</body>
</html>
