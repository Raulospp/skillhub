<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillHub — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { background: var(--white); }
    .profile-wrap { max-width: 860px; margin: 0 auto; padding: 48px 32px 80px; }

    .profile-header {
      display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px;
    }

    .profile-avatar-lg {
      width: 88px; height: 88px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #c8b8a2, #a08060);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 600; color: white; overflow: hidden;
    }
    .profile-avatar-lg img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

    .profile-meta { flex: 1; }
    .profile-name  { font-size: 1.3rem; font-weight: 600; color: var(--black); }
    .profile-rol   { font-size: 0.88rem; color: var(--gray-text); margin-top: 4px; }
    .profile-ciudad { font-size: 0.82rem; color: var(--gray-text); margin-top: 2px; }

    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .badge {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; font-weight: 500;
    }
    .badge-candidata { background:#EEEDFE; color:#3C3489; }
    .badge-empresa   { background:#E1F5EE; color:#085041; }
    .badge-mujer     { background:#FBEAF0; color:#72243E; }
    .badge-joven     { background:#FAEEDA; color:#633806; }
    .badge-web {
      font-size: 0.75rem; color: var(--gray-text); border: 1px solid var(--gray-mid);
      border-radius: 5px; padding: 2px 8px; text-decoration: none;
    }
    .badge-web:hover { border-color: var(--black); color: var(--black); }

    .profile-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .btn-editar {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--black); color: white; border: none; border-radius: 8px;
      padding: 9px 18px; font-family: var(--font-body); font-size: 0.83rem;
      font-weight: 500; cursor: pointer; text-decoration: none;
    }
    .btn-editar:hover { background: #2a2a2a; }
    .btn-chat {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: var(--black); border: 1.5px solid var(--gray-mid);
      border-radius: 8px; padding: 8px 16px; font-family: var(--font-body);
      font-size: 0.83rem; cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .btn-chat:hover { border-color: var(--black); }

    .hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }
    .section-title { font-size: 0.82rem; font-weight: 500; color: var(--black); margin-bottom: 16px; }
    .bio { font-size: 0.88rem; color: #444; line-height: 1.75; max-width: 580px; }

    .row-grid { display: grid; grid-template-columns: 120px 1fr; gap: 0; }
    .row-date    { font-size: 0.78rem; color: var(--gray-text); padding: 10px 0; }
    .row-content { padding: 10px 0 10px 20px; }
    .row-title   { font-size: 0.88rem; font-weight: 500; color: var(--black); }
    .row-sub     { font-size: 0.8rem; color: var(--gray-text); margin-top: 2px; }

    .nivel-badge {
      display: inline-block; font-size: 0.72rem; background: #f0ede8;
      color: var(--gray-text); border-radius: 20px; padding: 2px 8px; margin-left: 6px;
    }
    .cat-badge {
      display: inline-block; font-size: 0.72rem; background: #e8f0fe;
      color: #185FA5; border-radius: 20px; padding: 2px 8px; margin-left: 4px;
    }

    /* Reputación */
    .rep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .rep-card {
      background: #f5f4f1; border-radius: 12px; padding: 16px;
      text-align: center;
    }
    .rep-num   { font-family: var(--font-display); font-size: 1.6rem; color: var(--black); }
    .rep-label { font-size: 0.75rem; color: var(--gray-text); margin-top: 4px; }

    /* Reseñas */
    .resena-item {
      display: grid; grid-template-columns: 44px 1fr; gap: 12px;
      padding: 16px 0; border-bottom: 1px solid #f0ede8;
    }
    .resena-item:last-child { border-bottom: none; }
    .resena-av {
      width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: white; font-size: 0.88rem; flex-shrink: 0;
    }
    .resena-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .resena-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .resena-nombre { font-size: 0.85rem; font-weight: 600; color: var(--black); }
    .resena-stars  { color: #f0b429; font-size: 0.82rem; }
    .resena-fecha  { font-size: 0.72rem; color: var(--gray-text); margin-left: auto; }
    .resena-text   { font-size: 0.85rem; color: #444; line-height: 1.6; }

    /* Formulario nueva reseña */
    .resena-form {
      background: #f5f4f1; border-radius: 12px; padding: 20px; margin-top: 16px;
    }
    .stars-input { display: flex; gap: 6px; margin-bottom: 12px; }
    .star-btn {
      font-size: 1.6rem; background: none; border: none; cursor: pointer;
      opacity: 0.3; transition: opacity .1s; line-height: 1;
    }
    .star-btn.on { opacity: 1; }
    .resena-textarea {
      width: 100%; border: 1.5px solid var(--gray-mid); border-radius: 10px;
      padding: 10px 12px; font-family: var(--font-body); font-size: 0.85rem;
      resize: vertical; min-height: 72px; outline: none; background: white;
    }
    .resena-textarea:focus { border-color: var(--black); }
    .btn-enviar-resena {
      margin-top: 10px; background: var(--black); color: white; border: none;
      border-radius: 8px; padding: 10px 22px; font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 500; cursor: pointer; float: right;
    }
    .btn-enviar-resena:hover { background: #2a2a2a; }

    /* Contacto */
    .contact-grid { display: grid; grid-template-columns: 130px 1fr; gap: 8px 0; }
    .contact-label { font-size: 0.8rem; color: var(--gray-text); padding: 4px 0; }
    .contact-val   { font-size: 0.85rem; color: var(--black); padding: 4px 0; }
    .contact-val a { color: var(--black); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .contact-val a:hover { text-decoration: underline; }

    .wpp-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: #25D366; color: white; border-radius: 8px;
      padding: 6px 14px; font-size: 0.82rem; font-weight: 500;
      text-decoration: none; margin-top: 4px; transition: background .2s;
    }
    .wpp-link:hover { background: #128C7E; color: white; text-decoration: none; }

    .loading-text { color: var(--gray-text); font-size: 0.85rem; padding: 40px 0; }

    @media(max-width:600px){
      .rep-grid { grid-template-columns: 1fr 1fr; }
      .profile-header { flex-direction: column; }
      .profile-actions { flex-direction: row; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="home.html" class="navbar-logo">
    <img src="logo.svg" style="width:24px;height:24px;" alt="SkillHub"/>
    SkillHub
  </a>
  <input type="text" class="navbar-search" placeholder="Buscar..."
    onfocus="window.location.href='explore.html'"/>
  <div class="navbar-spacer"></div>
  <a href="profile.html" class="btn-nav">Mi perfil</a>
  <a href="profile.html" class="avatar-btn">
    <div class="avatar-inner" id="nav-avatar">SV</div>
  </a>
</nav>

<div class="profile-wrap">
  <p id="loading" class="loading-text">Cargando perfil...</p>

  <div id="perfil-content" style="display:none">

    <!-- ── Encabezado ── -->
    <div class="profile-header">
      <div class="profile-avatar-lg" id="p-avatar-wrap">
        <span id="p-avatar-iniciales">?</span>
      </div>

      <div class="profile-meta">
        <div class="profile-name"   id="p-nombre">—</div>
        <div class="profile-rol"    id="p-rol">—</div>
        <div class="profile-ciudad" id="p-ciudad" style="display:none"></div>
        <div class="profile-badges" id="p-badges"></div>
        <a class="badge-web" id="p-website" href="#" target="_blank" style="display:none;margin-top:8px;"></a>
      </div>

      <div class="profile-actions" id="p-actions"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Bio ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Sobre mí</div>
      <p class="bio" id="p-bio">—</p>
    </div>

    <hr class="hr"/>

    <!-- ── Lo que ofrece (solo candidatas) ── -->
    <div id="sec-servicios" style="margin-bottom:32px">
      <div class="section-title">Lo que ofrezco</div>
      <div id="p-servicios"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Lo que busca aprender ── -->
    <div id="sec-busca" style="margin-bottom:32px">
      <div class="section-title">Lo que busco aprender</div>
      <div id="p-busca"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Reputación ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Reputación en SkillHub</div>
      <div class="rep-grid" id="p-rep"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Reseñas ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Reseñas</div>
      <div id="p-resenas"><p style="font-size:0.85rem;color:var(--gray-text)">Cargando...</p></div>

      <!-- Formulario dejar reseña (solo si no es perfil propio) -->
      <div class="resena-form" id="form-resena" style="display:none">
        <div style="font-size:0.85rem;font-weight:500;color:var(--black);margin-bottom:10px">Dejar una reseña</div>
        <div class="stars-input" id="stars-input">
          <button class="star-btn" data-val="1" onclick="setStar(1)">★</button>
          <button class="star-btn" data-val="2" onclick="setStar(2)">★</button>
          <button class="star-btn" data-val="3" onclick="setStar(3)">★</button>
          <button class="star-btn" data-val="4" onclick="setStar(4)">★</button>
          <button class="star-btn" data-val="5" onclick="setStar(5)">★</button>
        </div>
        <textarea class="resena-textarea" id="txt-resena" placeholder="Cuéntanos tu experiencia con esta persona..."></textarea>
        <p class="error-msg" id="error-resena"></p>
        <button class="btn-enviar-resena" id="btn-resena" onclick="enviarResena()">Publicar reseña</button>
        <div style="clear:both"></div>
      </div>
    </div>

    <hr class="hr"/>

    <!-- ── Contacto ── -->
    <div style="margin-bottom:48px" id="sec-contacto"></div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();

  const sesion = getUsuario();
  if (sesion) document.getElementById('nav-avatar').textContent = iniciales(sesion.nombre);

  // ── Determinar qué perfil mostrar ────────────────────────────────────────
  // CORRECCIÓN: lee siempre el ?id= de la URL.
  // Solo cae al propio si no hay ?id= en la URL.
  const params   = new URLSearchParams(window.location.search);
  const urlId    = params.get('id');   // ID que viene en la URL (?id=xxx)
  const esPropio = !urlId;             // si NO hay ?id= en la URL es perfil propio

  const coloresAv = [
    'linear-gradient(135deg,#c8b8a2,#a08060)',
    'linear-gradient(135deg,#a0c8a0,#608060)',
    'linear-gradient(135deg,#d0a0c0,#a06080)',
    'linear-gradient(135deg,#a0b8d0,#607090)',
    'linear-gradient(135deg,#c8b090,#a07050)',
    'linear-gradient(135deg,#b0a0d0,#706090)',
  ];
  const colorPorId = id => coloresAv[(id?.charCodeAt?.(id.length - 1) || 0) % coloresAv.length];

  // ── Renders ───────────────────────────────────────────────────────────────

  function renderServicios(servicios) {
    if (!servicios?.length)
      return '<p style="font-size:0.85rem;color:var(--gray-text)">Sin servicios publicados aún</p>';
    return '<div class="row-grid">' + servicios.map(s => `
      <div class="row-date">2024 — Ahora</div>
      <div class="row-content">
        <div class="row-title">
          ${s.titulo || '—'}
          ${s.nivel     ? `<span class="nivel-badge">${s.nivel}</span>`     : ''}
          ${s.categoria ? `<span class="cat-badge">${s.categoria}</span>`   : ''}
        </div>
        <div class="row-sub">${s.ciudad || ''}</div>
      </div>`).join('') + '</div>';
  }

  function renderBusca(items) {
    if (!items?.length)
      return '<p style="font-size:0.85rem;color:var(--gray-text)">Nada especificado aún</p>';
    return '<div class="row-grid">' + items.map(i => `
      <div class="row-date">${i.anio || '—'}</div>
      <div class="row-content"><div class="row-title">${i.titulo} ↗</div></div>`).join('') + '</div>';
  }

  function renderResenas(resenas) {
    if (!resenas?.length)
      return '<p style="font-size:0.85rem;color:var(--gray-text)">Sin reseñas todavía</p>';

    return resenas.map(r => {
      const autor = r.autorId || {};
      const bg    = colorPorId(autor._id);
      const avHtml = autor.avatar
        ? `<img src="${autor.avatar}" alt=""/>`
        : iniciales(autor.nombre || '?');
      const estrellas = '★'.repeat(r.puntuacion) + '☆'.repeat(5 - r.puntuacion);
      const fecha = new Date(r.createdAt).toLocaleDateString('es-CO', { year:'numeric', month:'short' });

      return `
        <div class="resena-item">
          <div class="resena-av" style="background:${bg}">${avHtml}</div>
          <div>
            <div class="resena-header">
              <span class="resena-nombre">${autor.nombre || 'Usuario'}</span>
              <span class="resena-stars">${estrellas}</span>
              <span class="resena-fecha">${fecha}</span>
            </div>
            <div class="resena-text">${r.comentario}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Cargar perfil ─────────────────────────────────────────────────────────

  async function cargarPerfil() {
    try {
      // Si hay ?id= en la URL carga ese perfil
      // Si NO hay ?id= usa /me → el backend resuelve quién eres por el JWT
      const perfil  = esPropio ? await obtenerMiPerfil() : await obtenerPerfil(urlId);
      const resenas = await obtenerResenas(perfil._id);

      document.getElementById('loading').style.display        = 'none';
      document.getElementById('perfil-content').style.display = 'block';

      // Avatar
      const wrap = document.getElementById('p-avatar-wrap');
      if (perfil.avatar) {
        wrap.innerHTML = `<img src="${perfil.avatar}" alt="foto"/>`;
      } else {
        document.getElementById('p-avatar-iniciales').textContent = iniciales(perfil.nombre);
      }

      // Datos básicos
      document.getElementById('p-nombre').textContent = perfil.nombre || '—';
      document.getElementById('p-rol').textContent    = perfil.rol || (perfil.tipoUsuario === 'empresa' ? 'Empresa' : 'Candidata');
      document.getElementById('p-bio').textContent    = perfil.descripcion || 'Sin descripción aún.';

      if (perfil.ciudad) {
        const el = document.getElementById('p-ciudad');
        el.textContent  = '📍 ' + perfil.ciudad;
        el.style.display = 'block';
      }

      if (perfil.website) {
        const el = document.getElementById('p-website');
        el.textContent   = perfil.website;
        el.href          = perfil.website.startsWith('http') ? perfil.website : 'https://' + perfil.website;
        el.style.display = 'inline-block';
      }

      // Badges de rol y género
      const badges = document.getElementById('p-badges');
      const tipoBadge = perfil.tipoUsuario === 'empresa'
        ? `<span class="badge badge-empresa">Empresa</span>`
        : `<span class="badge badge-candidata">Candidata</span>`;
      const generoBadge = perfil.genero === 'mujer' ? `<span class="badge badge-mujer">Mujer</span>`
        : perfil.genero === 'joven' ? `<span class="badge badge-joven">Joven</span>` : '';
      badges.innerHTML = tipoBadge + generoBadge;

      // Acciones
      const actions = document.getElementById('p-actions');
      if (esPropio) {
        actions.innerHTML = `<a href="edit-profile.html" class="btn-editar">✏ Editar perfil</a>`;
      } else {
        actions.innerHTML = `<a href="chat.html?con=${perfil._id}" class="btn-chat">💬 Enviar mensaje</a>`;
      }

      // Secciones candidata / empresa
      if (perfil.tipoUsuario === 'candidata') {
        document.getElementById('p-servicios').innerHTML = renderServicios(perfil.serviciosOfrece);
        document.getElementById('p-busca').innerHTML     = renderBusca(perfil.serviciosBusca);
      } else {
        // Para empresas mostrar info de la empresa en vez de servicios
        document.getElementById('sec-servicios').innerHTML = `
          <div class="section-title">Información de la empresa</div>
          <div class="contact-grid">
            <div class="contact-label">Empresa</div>
            <div class="contact-val">${perfil.nombreEmpresa || '—'}</div>
            <div class="contact-label">Sector</div>
            <div class="contact-val">${perfil.sectorEmpresa || '—'}</div>
          </div>`;
        document.getElementById('sec-busca').style.display = 'none';
      }

      // Reputación
      document.getElementById('p-rep').innerHTML = `
        <div class="rep-card">
          <div class="rep-num">${perfil.horasAportadas || 0}</div>
          <div class="rep-label">Horas aportadas</div>
        </div>
        <div class="rep-card">
          <div class="rep-num">${perfil.horasRecibidas || 0}</div>
          <div class="rep-label">Horas recibidas</div>
        </div>
        <div class="rep-card">
          <div class="rep-num">${perfil.valoracion ? perfil.valoracion.toFixed(1) : '—'}</div>
          <div class="rep-label">Valoración / 5</div>
        </div>`;

      // Reseñas
      document.getElementById('p-resenas').innerHTML = renderResenas(resenas);

      // Mostrar formulario de reseña si NO es perfil propio
      if (!esPropio) {
        document.getElementById('form-resena').style.display = 'block';
      }

      // Contacto
      const sec = document.getElementById('sec-contacto');
      if (perfil.instagram || perfil.telefono || esPropio) {
        let html = `<div class="section-title">Contacto</div><div class="contact-grid">`;

        if (perfil.instagram) {
          html += `
            <div class="contact-label">Instagram</div>
            <div class="contact-val">
              <a href="https://instagram.com/${perfil.instagram}" target="_blank">
                @${perfil.instagram} ↗
              </a>
            </div>`;
        }

        if (perfil.telefono) {
          // Limpia el número: quita espacios, guiones, paréntesis
          const numLimpio = perfil.telefono.replace(/\D/g, '');
          // Si empieza con 0 reemplaza por 57 (Colombia), si no empieza con + agrega 57
          const numWpp = numLimpio.startsWith('0')
            ? '57' + numLimpio.slice(1)
            : numLimpio.length <= 10 ? '57' + numLimpio : numLimpio;

          html += `
            <div class="contact-label">Teléfono</div>
            <div class="contact-val">
              <div>${perfil.telefono}</div>
              <a class="wpp-link" href="https://wa.me/${numWpp}" target="_blank">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Abrir WhatsApp
              </a>
            </div>`;
        }

        if (perfil.email && esPropio) {
          html += `
            <div class="contact-label">Email</div>
            <div class="contact-val">
              <a href="mailto:${sesion?.email}">${sesion?.email}</a>
            </div>`;
        }

        html += `</div>`;
        sec.innerHTML = html;
      }

    } catch (err) {
      document.getElementById('loading').textContent = 'No se pudo cargar el perfil: ' + err.message;
    }
  }

  // ── Reseñas ───────────────────────────────────────────────────────────────

  let estrellasSel = 0;

  function setStar(val) {
    estrellasSel = val;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('on', i < val);
    });
  }

  async function enviarResena() {
    ocultarError('error-resena');
    const comentario = document.getElementById('txt-resena').value.trim();

    if (!estrellasSel) { mostrarError('error-resena', 'Selecciona una puntuación'); return; }
    if (!comentario)   { mostrarError('error-resena', 'Escribe un comentario'); return; }

    const btn = document.getElementById('btn-resena');
    setBtnLoading(btn, true, 'Publicar reseña');

    try {
      await crearResena({ receptorId: urlId, puntuacion: estrellasSel, comentario });

      // Recargar reseñas
      const resenas = await obtenerResenas(urlId);
      document.getElementById('p-resenas').innerHTML = renderResenas(resenas);

      // Limpiar form
      estrellasSel = 0;
      document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('on'));
      document.getElementById('txt-resena').value = '';

    } catch (err) {
      mostrarError('error-resena', err.message || 'Error al publicar');
    } finally {
      setBtnLoading(btn, false, 'Publicar reseña');
    }
  }

  cargarPerfil();
</script>
</body>
</html>
