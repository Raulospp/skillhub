<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillHub — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { background: var(--white); }

    .profile-wrap { max-width: 860px; margin: 0 auto; padding: 48px 32px; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .profile-avatar-lg {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8b8a2, #a08060);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .profile-avatar-lg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .profile-name  { font-size: 1.25rem; font-weight: 600; color: var(--black); }
    .profile-rol   { font-size: 0.85rem; color: var(--gray-text); margin-top: 3px; }
    .profile-ciudad { font-size: 0.82rem; color: var(--gray-text); margin-top: 2px; }

    .profile-website {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--gray-text);
      border: 1px solid var(--gray-mid);
      border-radius: 5px;
      padding: 2px 8px;
      text-decoration: none;
    }
    .profile-website:hover { border-color: var(--black); color: var(--black); }

    .btn-editar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--black);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-editar:hover { background: #2a2a2a; }

    .hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }

    .section-title {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bio { font-size: 0.85rem; color: #444; line-height: 1.7; max-width: 560px; }

    .row-grid { display: grid; grid-template-columns: 120px 1fr; gap: 0; }
    .row-date  { font-size: 0.78rem; color: var(--gray-text); padding: 10px 0; }
    .row-content { padding: 10px 0 10px 20px; }
    .row-item-title { font-size: 0.88rem; font-weight: 500; color: var(--black); }
    .row-item-sub   { font-size: 0.8rem; color: var(--gray-text); margin-top: 2px; }

    .nivel-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: #f0ede8;
      color: var(--gray-text);
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .cat-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: #e8f0fe;
      color: #185FA5;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .rep-value { font-size: 0.88rem; color: var(--black); }
    .rep-value strong { font-weight: 600; }

    .review-text { font-size: 0.85rem; color: #444; line-height: 1.6; }
    .review-stars { font-size: 0.78rem; color: var(--gray-text); margin-bottom: 3px; }

    .contact-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 0; }
    .contact-label { font-size: 0.8rem; color: var(--gray-text); padding: 4px 0; }
    .contact-val   { font-size: 0.85rem; color: var(--black); padding: 4px 0; }
    .contact-val a { color: var(--black); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }

    .empty-txt { font-size: 0.85rem; color: var(--gray-text); }

    .loading-text { color: var(--gray-text); font-size: 0.85rem; padding: 20px 0; }

    .valoracion-num {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--black);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="home.html" class="navbar-logo">
    <svg width="24" height="24" viewBox="0 0 52 52" fill="none">
      <rect width="52" height="52" rx="14" fill="#111"/>
      <text x="26" y="34" text-anchor="middle" fill="white"
        font-size="20" font-weight="600" font-family="sans-serif">SH</text>
    </svg>
    SkillHub
  </a>
  <input type="text" class="navbar-search" placeholder="Buscar servicios..."
    onfocus="window.location.href='explore.html'"/>
  <div class="navbar-spacer"></div>
  <a href="profile.html" class="btn-nav">Mi perfil</a>
  <a href="profile.html" class="avatar-btn">
    <div class="avatar-inner" id="nav-avatar">SV</div>
  </a>
</nav>

<div class="profile-wrap">
  <p id="loading" class="loading-text">Cargando perfil...</p>

  <div id="perfil-content" style="display:none">

    <!-- ── Encabezado ── -->
    <div class="profile-header">

      <div class="profile-avatar-lg" id="p-avatar-wrap">
        <span id="p-avatar-iniciales">SV</span>
      </div>

      <div style="flex:1">
        <div class="profile-name"    id="p-nombre">—</div>
        <div class="profile-rol"     id="p-rol">—</div>
        <div class="profile-ciudad"  id="p-ciudad" style="display:none"></div>
        <a   class="profile-website" id="p-website" href="#" target="_blank" style="display:none"></a>
      </div>

      <!-- Botón editar solo en perfil propio -->
      <div id="btn-editar-wrap"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Sobre mí ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Sobre mí</div>
      <p class="bio" id="p-bio">—</p>
    </div>

    <hr class="hr"/>

    <!-- ── Lo que ofrece ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Lo que ofrezco</div>
      <div id="p-servicios-ofrece"><p class="empty-txt">Cargando...</p></div>
    </div>

    <hr class="hr"/>

    <!-- ── Lo que busca aprender ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Lo que busco aprender</div>
      <div id="p-servicios-busca"><p class="empty-txt">Sin datos</p></div>
    </div>

    <hr class="hr"/>

    <!-- ── Reputación ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Reputación en SkillHub</div>
      <div id="p-reputacion"></div>
    </div>

    <hr class="hr"/>

    <!-- ── Reseñas ── -->
    <div style="margin-bottom:32px">
      <div class="section-title">Reseñas de otras personas</div>
      <div id="p-resenas"><p class="empty-txt">Cargando...</p></div>
    </div>

    <hr class="hr"/>

    <!-- ── Contacto (solo perfil propio) ── -->
    <div style="margin-bottom:48px" id="contacto-section" style="display:none"></div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();

  const sesion  = getUsuario();
  const params  = new URLSearchParams(window.location.search);
  const perfilId = params.get('id') || sesion?.id;
  const esPropio = !params.get('id') || params.get('id') === sesion?.id;

  if (sesion) document.getElementById('nav-avatar').textContent = iniciales(sesion.nombre);

  // ── Renderers ────────────────────────────────────────────────────────────

  function renderServicios(servicios) {
    if (!servicios?.length)
      return '<p class="empty-txt">Sin servicios publicados aún</p>';

    return '<div class="row-grid">' +
      servicios.map(s => `
        <div class="row-date">2024 — Ahora</div>
        <div class="row-content">
          <div class="row-item-title">
            ${s.titulo || '—'}
            ${s.nivel     ? `<span class="nivel-badge">${s.nivel}</span>`     : ''}
            ${s.categoria ? `<span class="cat-badge">${s.categoria}</span>`   : ''}
          </div>
          <div class="row-item-sub">${s.ciudad || ''}</div>
        </div>`
      ).join('') + '</div>';
  }

  function renderBusca(items) {
    if (!items?.length)
      return '<p class="empty-txt">Nada especificado aún</p>';

    return '<div class="row-grid">' +
      items.map(i => `
        <div class="row-date">${i.anio || '—'}</div>
        <div class="row-content">
          <div class="row-item-title">${i.titulo} ↗</div>
        </div>`
      ).join('') + '</div>';
  }

  function renderResenas(resenas) {
    if (!resenas?.length)
      return '<p class="empty-txt">Sin reseñas todavía</p>';

    return resenas.map(r => `
      <div style="display:grid;grid-template-columns:80px 1fr;margin-bottom:16px">
        <div class="row-date">${new Date(r.createdAt).getFullYear()}</div>
        <div class="row-content">
          <div class="review-stars">
            ${'★'.repeat(r.puntuacion)}${'☆'.repeat(5 - r.puntuacion)}
            · ${r.autorId?.nombre || 'Anónimo'}
          </div>
          <div class="review-text">${r.comentario}</div>
        </div>
      </div>`
    ).join('');
  }

  // ── Cargar perfil ─────────────────────────────────────────────────────────

  async function cargarPerfil() {
    try {
      const [perfil, resenas] = await Promise.all([
        obtenerPerfil(perfilId),
        obtenerResenas(perfilId),
      ]);

      document.getElementById('loading').style.display        = 'none';
      document.getElementById('perfil-content').style.display = 'block';

      // Avatar: foto o iniciales
      const avatarWrap = document.getElementById('p-avatar-wrap');
      if (perfil.avatar) {
        avatarWrap.innerHTML = `<img src="${perfil.avatar}" alt="foto"/>`;
      } else {
        document.getElementById('p-avatar-iniciales').textContent = iniciales(perfil.nombre);
      }

      // Datos básicos
      document.getElementById('p-nombre').textContent = perfil.nombre || '—';
      document.getElementById('p-rol').textContent    = perfil.rol    || 'Miembro de SkillHub';
      document.getElementById('p-bio').textContent    = perfil.descripcion || 'Sin descripción aún.';

      if (perfil.ciudad) {
        const el = document.getElementById('p-ciudad');
        el.textContent    = '📍 ' + perfil.ciudad;
        el.style.display  = 'block';
      }

      if (perfil.website) {
        const el  = document.getElementById('p-website');
        el.textContent = perfil.website;
        el.href        = perfil.website.startsWith('http') ? perfil.website : 'https://' + perfil.website;
        el.style.display = 'inline-block';
      }

      // Botón editar (solo propio)
      if (esPropio) {
        document.getElementById('btn-editar-wrap').innerHTML =
          `<a href="edit-profile.html" class="btn-editar">✏ Editar perfil</a>`;
      }

      // Secciones
      document.getElementById('p-servicios-ofrece').innerHTML = renderServicios(perfil.serviciosOfrece);
      document.getElementById('p-servicios-busca').innerHTML  = renderBusca(perfil.serviciosBusca);

      // Reputación
      document.getElementById('p-reputacion').innerHTML = `
        <div class="row-grid">
          <div class="row-date">2024</div>
          <div class="row-content">
            <div class="rep-value">
              Horas aportadas: <strong>${perfil.horasAportadas || 0} h</strong>
            </div>
          </div>
          <div class="row-date">2024</div>
          <div class="row-content">
            <div class="rep-value">
              Horas recibidas: <strong>${perfil.horasRecibidas || 0} h</strong>
            </div>
          </div>
          <div class="row-date">—</div>
          <div class="row-content">
            <div class="rep-value">
              Valoración:
              <strong>${perfil.valoracion ? perfil.valoracion.toFixed(2) + ' / 5' : 'Sin valoraciones aún'}</strong>
            </div>
          </div>
        </div>`;

      // Reseñas
      document.getElementById('p-resenas').innerHTML = renderResenas(resenas);

      // Contacto (solo propio)
      if (esPropio) {
        const sec = document.getElementById('contacto-section');
        sec.style.display = 'block';
        sec.innerHTML = `
          <div class="section-title">Contacto</div>
          <div class="contact-grid">
            <div class="contact-label">Instagram</div>
            <div class="contact-val">
              ${perfil.instagram
                ? `<a href="https://instagram.com/${perfil.instagram}" target="_blank">@${perfil.instagram} ↗</a>`
                : '—'}
            </div>
            <div class="contact-label">Teléfono</div>
            <div class="contact-val">
              ${perfil.telefono
                ? `<a href="tel:${perfil.telefono}">${perfil.telefono}</a>`
                : '—'}
            </div>
            <div class="contact-label">Email</div>
            <div class="contact-val">${sesion?.email || '—'}</div>
          </div>`;
      }

    } catch (err) {
      document.getElementById('loading').textContent =
        'No se pudo cargar el perfil: ' + err.message;
    }
  }

  cargarPerfil();
</script>
</body>
</html>
